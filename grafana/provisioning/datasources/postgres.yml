# Auto-provision the OmniFleet Postgres as a Grafana datasource.
apiVersion: 1
datasources:
  - name: OmniFleet-Postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: omnifleet
    user: omnifleet
    secureJsonData:
      password: omnifleet123
    jsonData:
      sslmode: disable
      postgresVersion: 1600
    isDefault: true
