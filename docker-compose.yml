# =============================================================================
# OmniFleet V003 - Docker Compose  (hardened, based on the proven V002 setup)
# =============================================================================
# JupyterLab : http://localhost:8888   (no token)
# Airflow    : http://localhost:8080   admin / omnifleet123
# MinIO      : http://localhost:9001   omnifleet / omnifleet123
# Grafana    : http://localhost:3000   admin / omnifleet123
# Superset   : http://localhost:8089   admin / omnifleet123
# Kafka UI   : http://localhost:8085
# PostgreSQL : localhost:5432          omnifleet / omnifleet123
# =============================================================================

# Shared Airflow settings so scheduler + webserver + init are IDENTICAL.
# The shared SECRET_KEY + FERNET_KEY fix the "403 could not read logs" error.
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  user: "0:0"
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://omnifleet:omnifleet123@postgres:5432/omnifleet
    AIRFLOW__CORE__FERNET_KEY: "uMBZLVHT72LODNdYFkRSw5-oP2tW1j3k9lZbFJqKXeI="
    AIRFLOW__WEBSERVER__SECRET_KEY: "omnifleet-shared-airflow-secret-key-123456789"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy
  networks: [omnifleet-net-v003]
  restart: unless-stopped

services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.4
    container_name: omnifleet-postgres-v003
    hostname: postgres
    environment:
      POSTGRES_USER: omnifleet
      POSTGRES_PASSWORD: omnifleet123
      POSTGRES_DB: omnifleet
    ports: ["5432:5432"]
    volumes:
      - postgres-data-v003:/var/lib/postgresql/data
    networks: [omnifleet-net-v003]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnifleet"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO + bucket init
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: omnifleet-minio-v003
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: omnifleet
      MINIO_ROOT_PASSWORD: omnifleet123
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio-data-v003:/data
    networks: [omnifleet-net-v003]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    container_name: omnifleet-minio-init-v003
    depends_on:
      minio:
        condition: service_healthy
    networks: [omnifleet-net-v003]
    entrypoint: >
      /bin/sh -c "
        mc alias set omni http://minio:9000 omnifleet omnifleet123;
        mc mb --ignore-existing omni/omnifleet-bronze;
        mc mb --ignore-existing omni/omnifleet-silver;
        echo 'Buckets ready.';
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # KAFKA (KRaft)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: omnifleet-kafka-v003
    hostname: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data-v003:/var/lib/kafka/data
    networks: [omnifleet-net-v003]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: omnifleet-kafka-ui-v003
    ports: ["8085:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: omnifleet-v003
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks: [omnifleet-net-v003]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SPARK + JUPYTERLAB
  # ---------------------------------------------------------------------------
  spark:
    image: quay.io/jupyter/all-spark-notebook:spark-3.5.3
    container_name: omnifleet-spark-v003
    hostname: spark
    user: root
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      GRANT_SUDO: "yes"
      AWS_ACCESS_KEY_ID: omnifleet
      AWS_SECRET_ACCESS_KEY: omnifleet123
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./spark/jars:/usr/local/spark/jars/extra
      - ./sql/gold_schema.sql:/home/jovyan/work/gold_schema.sql
    command: start-notebook.sh --NotebookApp.token=''
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [omnifleet-net-v003]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # dbt  (pinned to 1.9.1 - installs itself on boot, like V002 did with 1.8.2)
  # ---------------------------------------------------------------------------
  dbt:
    image: python:3.11-slim
    container_name: omnifleet-dbt-v003
    working_dir: /dbt
    entrypoint: >
      /bin/sh -c "
        pip install dbt-postgres==1.9.1 --quiet --no-cache-dir &&
        echo 'dbt is ready' &&
        tail -f /dev/null
      "
    environment:
      DBT_PROFILES_DIR: /dbt
    volumes:
      - ./dbt:/dbt
      - dbt-packages-v003:/root/.local
    depends_on:
      postgres:
        condition: service_healthy
    networks: [omnifleet-net-v003]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # AIRFLOW
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: omnifleet-airflow-init-v003
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin --password omnifleet123
          --firstname OmniFleet --lastname Admin
          --role Admin --email admin@omnifleet.local || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: omnifleet-airflow-webserver-v003
    command: webserver
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: omnifleet-airflow-scheduler-v003
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # GRAFANA
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: omnifleet-grafana-v003
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: omnifleet123
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["3000:3000"]
    volumes:
      - grafana-data-v003:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres:
        condition: service_healthy
    networks: [omnifleet-net-v003]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # REDIS  (Superset cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.0-alpine
    container_name: omnifleet-redis-v003
    ports: ["6379:6379"]
    volumes:
      - redis-data-v003:/data
    networks: [omnifleet-net-v003]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # APACHE SUPERSET
  # ---------------------------------------------------------------------------
  superset:
    image: apache/superset:4.0.2
    container_name: omnifleet-superset-v003
    hostname: superset
    environment:
      SUPERSET_SECRET_KEY: "omnifleet-superset-secret-key-change-me-32chars"
      REDIS_URL: redis://redis:6379/0
    ports: ["8089:8088"]
    volumes:
      - superset-data-v003:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
        pip install psycopg2-binary --quiet &&
        superset db upgrade &&
        superset fab create-admin --username admin --firstname OmniFleet --lastname Admin --email admin@omnifleet.local --password omnifleet123 || true &&
        superset init &&
        superset run -p 8088 -h 0.0.0.0 --with-threads
      "
    networks: [omnifleet-net-v003]
    restart: unless-stopped

# =============================================================================
volumes:
  postgres-data-v003:
  minio-data-v003:
  kafka-data-v003:
  grafana-data-v003:
  superset-data-v003:
  redis-data-v003:
  dbt-packages-v003:

networks:
  omnifleet-net-v003:
    driver: bridge
